<!DOCTYPE html>
<html>
<head>
<title>Jai Seva Medical Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f6ff;
text-align:center;
}

header{
background:linear-gradient(45deg,#0a7cff,#00c6ff);
color:white;
padding:25px;
font-size:26px;
font-weight:bold;
animation:fadeIn 2s ease-in;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
animation:slideUp 1.5s ease-in-out;
}

img{
width:90%;
max-width:400px;
border-radius:12px;
margin:15px 0;
}

.button{
display:inline-block;
padding:12px 25px;
margin:10px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.call{
background:#0a7cff;
}

.whatsapp{
background:#25D366;
}

.map{
width:100%;
height:300px;
border-radius:10px;
margin-top:15px;
}

.footer{
background:#111;
color:white;
padding:15px;
margin-top:30px;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes slideUp{
from{transform:translateY(50px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

</style>
</head>

<body>

<header>
Jan Seva Medical Store
<br>
<small>Open 24/7</small>
</header>

<div class="card">
<h2>Our Shop</h2>
<img src="shop.jpg" alt="Shop Photo">
<p>Providing trusted and quality medicines for your family.</p>
</div>

<div class="card">
<h2>Owner Details</h2>
<img src="owner.jpg" alt="Owner Photo">
<p><b>Name:</b> Madhav Mehta</p>
<p><b>Phone:</b> +91 70899 90224</p>

<a class="button call" href="tel:+917089990224">Call Now</a>
<a class="button whatsapp" href="https://wa.me/917089990224" target="_blank">WhatsApp</a>

</div>

<div class="card">
<h2>Our Location</h2>
<iframe 
class="map"
src="https://www.google.com/maps?q=India&output=embed">
</iframe>
</div>

<div class="footer">
© 2026 Jai Seva Medical Store | All Rights Reserved
</div>

</body>
</html>
